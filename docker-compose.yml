services:
  postgres:
    image: postgres:16
    container_name: headless_calendar_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build: .
    container_name: headless_calendar_web
    env_file:
      - .env
    ports:
      - "${APP_PORT}:8000"
    volumes:
      - ./logs:/app/logs
      - ./app:/app/app
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
